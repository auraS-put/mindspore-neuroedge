# =============================================================================
# Lightweight model training configuration
# Paper 04 (Wang C. et al. — PCNN-BiLSTM):
#   Adam LR=2e-5, 1000 epochs (patience=50 replaces full run)
# Paper 14 (Manzouri et al. — EE-Implantable):
#   Power-budget constrained; small LR, long training, weighted CE
# =============================================================================

epochs: 300
batch_size: 32
learning_rate: 2.0e-5
weight_decay: 1.0e-5
optimizer: adam

gradient_clip_norm: 1.0

scheduler:
  name: cosine_annealing
  warmup_epochs: 5
  min_lr: 1.0e-8

loss:
  name: weighted_ce
  class_weights: auto
  focal_gamma: 2.0
  label_smoothing: 0.05

sampler:
  strategy: weighted
  neg_to_pos_ratio: 3

early_stopping:
  patience: 50
  monitor: val_recall
  mode: max

checkpoint:
  save_top_k: 3
  monitor: val_recall
  mode: max

mixed_precision: false
num_workers: 4
seed: 42
