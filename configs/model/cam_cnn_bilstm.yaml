name: cam_cnn_bilstm
arch: cam_cnn_bilstm

# Architecture — Channel Attention + CNN + BiLSTM (Paper 18 (Mehrabi et al. — ConvSNN); Paper 19 (El-Dajani et al. — BTE-CNN-LSTM); Paper 20 (Wang Y. et al. — CAM-CNN) — novel)
stem_channels: 64
lstm_hidden: 40
dropout: 0.25
num_classes: 2

