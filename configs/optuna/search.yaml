# Optuna hyperparameter search configuration
study_name: auras_hpo
storage: sqlite:///experiments/optuna/study.db
direction: maximize              # maximize recall
n_trials: 100
timeout_hours: 24
pruner:
  name: median                   # median | hyperband
  n_startup_trials: 10
  n_warmup_steps: 20

sampler:
  name: tpe                      # tpe | cmaes

# Search space definition
search_space:
  learning_rate:
    type: log_float
    low: 1.0e-5
    high: 1.0e-2
  batch_size:
    type: categorical
    choices: [64, 128, 256, 512]
  dropout:
    type: float
    low: 0.0
    high: 0.5
    step: 0.05
  hidden_size:
    type: categorical
    choices: [64, 128, 256]
  weight_decay:
    type: log_float
    low: 1.0e-6
    high: 1.0e-2
  loss:
    type: categorical
    choices: [weighted_ce, focal]
  focal_gamma:
    type: float
    low: 1.0
    high: 5.0
    step: 0.5
