name: siena
root: data/raw/siena/siena-scalp-eeg-database-1.0.0
processed_dir: data/processed
sampling_rate_hz: 512          # native rate of Siena EDF files
target_rate_hz: 256            # downsample target

channels:
  mode: wearable               # wearable | all | custom
  selected: [F7, F8, T7, T8]
  max_channels: 4

window:
  seconds: 4
  stride_seconds: 1

preprocessing:
  bandpass_low_hz: 0.5
  bandpass_high_hz: 45.0
  notch_hz: 50                 # EU mains frequency
  zscore: true

split:
  method: loso                 # loso (leave-one-subject-out) | random | stratified
  test_size: 0.2
  val_size: 0.1
